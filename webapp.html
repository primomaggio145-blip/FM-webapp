<!DOCTYPE html><html lang="it">
<head>
  <meta charset="UTF-8" />

  <!-- ── RESPONSIVE MOBILE ── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- ── PWA / iOS HOME SCREEN ── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Futuro Musica">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="application-name" content="Futuro Musica">

  <!-- ── ICONE iOS ── -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <!-- ── MANIFEST PWA ── -->
  <link rel="manifest" href="manifest.json">

  <!-- ── FAVICON ── -->
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <title>Futuro Musica — Gestionale</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 1. Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- 2. Client Supabase + FMAdapter -->
  <script src="supabase_integration.js"></script>
  <!-- 3. fm_sync: carica i dati da Supabase, poi carica app.js, poi monta React -->
  <script src="fm_sync.js"></script>

  <style>
    /* ── Reset base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root { height: 100%; width: 100%; }

    body {
      background: #f4f6fa;
      /* FIX iOS: Padding per evitare tagli su notch e barra home */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* FIX TABELLE: Forza lo scroll orizzontale se la tabella è troppo grande */
    table {
        display: block !important;
        width: 100% !important;
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
    }

    /* CLASSI PER NASCONDERE/MOSTRARE TRA DESKTOP E PWA */
    .pwa-only { display: none !important; }
    @media (display-mode: standalone) {
      .desktop-only { display: none !important; }
      .pwa-only { display: block !important; }
    }

  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">Futuro <span>Musica</span></div>
    <div class="spinner" id="spinner"></div>
    <div class="sub" id="status">Connessione Supabase…</div>
  </div>
  <div id="root"></div>
  <div id="sync-toast">✓ Dati salvati</div>

  <script>
    // Error handler globale — cattura errori JS e Promise non gestite
    window.onerror = function(msg, src, line) {
      document.getElementById('spinner').style.display = 'none';
      var d = document.createElement('div');
      d.className = 'err';
      d.textContent = 'ERRORE JS:\n' + msg + '\nLinea: ' + line + '\nFile: ' + src;
      document.getElementById('loading').appendChild(d);
    };
    window.onunhandledrejection = function(e) {
      var d = document.createElement('div');
      d.className = 'err';
      d.textContent = 'Promise error: ' + (e.reason?.message || e.reason);
      document.getElementById('loading').appendChild(d);
    };
  </script>

  <!--
    NON serve <script src="app.js"> qui.
    fm_sync.js carica app.js dinamicamente DOPO aver caricato i dati da Supabase,
    garantendo che React usi sempre i dati reali e mai i dati demo.
  -->

  <!-- ── Registrazione Service Worker per PWA ── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/FM-webapp/service-worker.js', {
          scope: '/FM-webapp/'
        }).then(function(reg) {
          console.log('SW pronto');
        });
      });
    }

  </script>
</body>
</html>
