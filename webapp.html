<!DOCTYPE html><html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Futuro Musica — Gestionale</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 1. Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- 2. Client Supabase + FMAdapter -->
  <script src="supabase_integration.js"></script>
  <!-- 3. fm_sync: carica i dati da Supabase, poi carica app.js, poi monta React -->
  <script src="fm_sync.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;width:100%}
    body{background:#f4f6fa}
    #loading{
      position:fixed;inset:0;
      background:linear-gradient(160deg,#123a7a 0%,#1a4fa0 60%,#0d2d6b 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:9999;padding:24px
    }
    .logo{font-size:26px;font-weight:700;color:#fff;
      font-family:'Oswald',sans-serif;letter-spacing:.12em;text-transform:uppercase}
    .logo span{color:#e88080}
    .spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.2);
      border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
    .sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.12em;text-transform:uppercase}
    .err{color:#fca5a5;font-size:13px;background:rgba(0,0,0,.35);padding:16px;
      max-width:90vw;width:100%;word-break:break-all;white-space:pre-wrap;max-height:60vh;overflow:auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    #sync-toast{
      position:fixed;bottom:20px;right:16px;z-index:9001;
      background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;
      padding:8px 14px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;
      opacity:0;transition:opacity .4s;pointer-events:none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">Futuro <span>Musica</span></div>
    <div class="spinner" id="spinner"></div>
    <div class="sub" id="status">Connessione Supabase…</div>
  </div>
  <div id="root"></div>
  <div id="sync-toast">✓ Dati salvati</div>

  <script>
    // Error handler globale — cattura errori JS e Promise non gestite
    window.onerror = function(msg, src, line) {
      document.getElementById('spinner').style.display = 'none';
      var d = document.createElement('div');
      d.className = 'err';
      d.textContent = 'ERRORE JS:\n' + msg + '\nLinea: ' + line + '\nFile: ' + src;
      document.getElementById('loading').appendChild(d);
    };
    window.onunhandledrejection = function(e) {
      var d = document.createElement('div');
      d.className = 'err';
      d.textContent = 'Promise error: ' + (e.reason?.message || e.reason);
      document.getElementById('loading').appendChild(d);
    };
  </script>

  <!--
    NON serve <script src="app.js"> qui.
    fm_sync.js carica app.js dinamicamente DOPO aver caricato i dati da Supabase,
    garantendo che React usi sempre i dati reali e mai i dati demo.
  -->
</body>
</html>
